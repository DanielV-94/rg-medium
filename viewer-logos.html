<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor de Logos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 2rem;
    }

    .logo-container {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .logo-box {
      background: white;
      padding: 1rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    img {
      max-width: 400px;
      height: auto;
      display: block;
    }

    h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>
  <h1>Visualizador de Logos - RG Medium</h1>

  <div class="logo-container">
    <div class="logo-box">
      <h2>Logo 1</h2>
      <img src="./LOGO/logo (1).png" alt="Logo 1">
    </div>
    <div class="logo-box">
      <h2>Logo 2</h2>
      <img src="./LOGO/logo (2).png" alt="Logo 2">
    </div>
  </div>
</body>

</html>
